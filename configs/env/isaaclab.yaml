##################################################################################
# Isaac Lab / unitree_rl_lab environment config (Hydra group: env)
#
# env_type must stay 'isaaclab' — flash_rl.envs only implements that backend.
# env_name is the gym registry id passed to gym.make / parse_env_cfg.
#
# Defaults target unitree deploy (obs/action managers → deploy.yaml).
# Official Isaac Lab examples still work, e.g.:
#   --overrides env.env_name='Isaac-Velocity-Flat-G1-v0'
#
# num_eval_envs / num_record_envs / rescale_action / max_episode_steps are
# unused by the Isaac Lab wrapper and must be null (shared SimulationApp).
##################################################################################

env_type: 'isaaclab'
# Official IsaacLab: Isaac-Velocity-Flat-G1-v0
# unitree_rl_lab (deploy-oriented): Unitree-G1-29dof-Velocity
env_name: 'Unitree-G1-29dof-Velocity'
num_env_steps: ${num_env_steps}

seed: ${seed}
num_train_envs: ${num_train_envs}
num_eval_envs: ${num_eval_envs}
num_record_envs: ${num_record_envs}
rescale_action: null
max_episode_steps: null
